name: Build and Deploy Dino POS Landing Page

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint check
        run: bun run lint

      - name: Build Next.js application
        run: bun run build

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            TARGET_DIR="${{ secrets.TARGET_DIR || '/var/www/dino-pos-landing-page' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            echo "Deploying to $TARGET_DIR..."

            # Auto-create target directory if it does not exist
            if [ ! -d "$TARGET_DIR" ]; then
              echo "Directory $TARGET_DIR does not exist. Creating it..."
              mkdir -p "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"

            # Clone repository if empty / first-time deployment
            if [ ! -d ".git" ]; then
              echo "First-time deployment: cloning repository..."
              git clone "$REPO_URL" .
            else
              echo "Fetching latest changes..."
              git fetch origin
              BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
              git reset --hard "origin/$BRANCH" || git reset --hard origin/main || git reset --hard origin/master
            fi

            # Install dependencies & build using Bun if available, or npm
            if command -v bun > /dev/null 2>&1; then
              echo "Using Bun..."
              bun install
              bun run build
            else
              echo "Using npm..."
              npm install
              npm run build
            fi

            # Reload or start with PM2 on port 3003
            if command -v pm2 > /dev/null 2>&1; then
              if pm2 describe dino-pos-landing-page > /dev/null 2>&1; then
                echo "Reloading existing PM2 instance..."
                pm2 reload ecosystem.config.js --env production
              else
                echo "Starting new PM2 instance..."
                pm2 start ecosystem.config.js --env production
              fi
              pm2 save
            else
              echo "Warning: PM2 is not installed. Starting application with npm..."
              npm run start &
            fi

            echo "Deployment completed successfully!"
