name: Build and Deploy Dino POS Landing Page

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Build Next.js application
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            TARGET_DIR="${{ secrets.TARGET_DIR || '/var/www/dino-pos-landing-page' }}"
            echo "Deploying to $TARGET_DIR..."

            # Navigate to target directory
            if [ -d "$TARGET_DIR" ]; then
              cd "$TARGET_DIR"
            else
              echo "Error: Directory $TARGET_DIR does not exist."
              exit 1
            fi

            # Fetch latest changes
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            # Install dependencies & build
            npm ci
            npm run build

            # Reload or start with PM2 on port 3003
            if pm2 describe dino-pos-landing-page > /dev/null 2>&1; then
              echo "Reloading existing PM2 instance..."
              pm2 reload ecosystem.config.js --env production
            else
              echo "Starting new PM2 instance..."
              pm2 start ecosystem.config.js --env production
            fi

            pm2 save
            echo "Deployment completed successfully!"
